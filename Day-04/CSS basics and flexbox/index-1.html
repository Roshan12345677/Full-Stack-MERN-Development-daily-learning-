<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        button{
            background-color: aquamarine;
            color: black;
            border: 2px solid green;
            border-radius: 8px;
            margin: 10px;
            padding: 10px;
        }

        p{
            font-size : 20px;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <p style="text-decoration: underline; background-color:aqua; color:brown">This is a CSS Class.</p>
    <button style="background-color: aquamarine; color : black;">CLick Me</ button>
    <button style="background-color: red; color : white">Click Me</button>
    <button>Submit</button>
</body>
</html>
