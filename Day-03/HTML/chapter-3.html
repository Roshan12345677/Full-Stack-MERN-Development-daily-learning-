<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists in HTML</title>
</head>
<body>
    <!-- Unordered lists -->
    <ul>
        <li>Mango</li>
        <li>Apple</li>
        <li>Orange</li>
    </ul>


    <!-- Ordered lists -->
    <ol>
        <li>Boil Milk</li>
        <li>Add Sugar</li>
        <li>Add Chaipati</li>
    </ol>

    <!-- Nested lists -->
    <ul>
        <li>Chips</li>
        <li>Colddrinks</li>
        <ul>
            <li>Pepsi</li>
            <li>Coke</li>
        </ul>
    </ul>

    <!-- description lists -->
    <dl>
        <dt>Chai</dt>
        <dd>Spicy Tea</dd>
    </dl>
</body>
</html>
